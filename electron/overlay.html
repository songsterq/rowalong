<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Electron Overlay Spike</title>
    <style>
      html, body {
        margin: 0;
        height: 100%;
        background: transparent;
        font-family: -apple-system, system-ui, sans-serif;
        -webkit-user-select: none;
        cursor: default;
      }
      .box {
        height: 100%;
        box-sizing: border-box;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: #ff4d4f;
        color: #fff;
        border-radius: 16px;
        -webkit-app-region: drag; /* let the user drag the frameless window */
      }
      .label { font-weight: 800; letter-spacing: 0.05em; }
      .count { font-size: 48px; font-weight: 800; font-variant-numeric: tabular-nums; }
      .hint { font-size: 11px; opacity: 0.85; margin-top: 6px; }
    </style>
  </head>
  <body>
    <div class="box">
      <div class="label">ALL OUT</div>
      <div class="count" id="c">0:30</div>
      <div class="hint">Electron overlay spike — drag me over Apple TV</div>
    </div>
    <script>
      let n = 30;
      const el = document.getElementById('c');
      setInterval(() => {
        n = n <= 0 ? 30 : n - 1;
        el.textContent = '0:' + String(n).padStart(2, '0');
      }, 1000);
    </script>
  </body>
</html>
